name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build + unit tests ────────────────────────────────────────────────────
  build-test:
    runs-on: ubuntu-latest
    env:
      Z3_SYS_Z3_HEADER: /usr/include/z3.h
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install z3 + clang
        run: sudo apt-get install -y libz3-dev clang

      - name: Fmt check
        run: cargo fmt --all -- --check

      - name: Clippy
        # axiom-guest is riscv32 no_std — exclude from host linting
        run: cargo clippy --workspace --exclude axiom-guest -- -D warnings

      - name: Test
        # axiom-guest binary is riscv32 — cannot execute on ubuntu-latest x86
        run: cargo test --workspace --exclude axiom-guest

  # ── P2P testnet — 2-node gossipsub verification ───────────────────────────
  p2p-testnet:
    runs-on: ubuntu-latest
    needs: build-test
    env:
      Z3_SYS_Z3_HEADER: /usr/include/z3.h
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install z3 + clang
        run: sudo apt-get install -y libz3-dev clang

      - name: Build release binary
        run: cargo build --release -p axiom-mcp-server

      - name: Start Node 1 (bootstrap)
        run: |
          AXIOM_TRANSPORT=http PORT=8080 AXIOM_P2P_ENABLED=1 AXIOM_P2P_PORT=9000 \
            ./target/release/axiom-mcp > /tmp/node1.log 2>&1 &
          echo "NODE1_PID=$!" >> $GITHUB_ENV
          sleep 4

      - name: Get Node 1 peer ID
        run: |
          PEER1_ID=$(curl -sf http://localhost:8080/p2p/status | python3 -c "import sys,json; print(json.load(sys.stdin)['peer_id'])")
          echo "PEER1_ID=$PEER1_ID" >> $GITHUB_ENV
          echo "Node 1 peer_id: $PEER1_ID"

      - name: Start Node 2 (dials Node 1)
        run: |
          AXIOM_TRANSPORT=http PORT=8081 AXIOM_P2P_ENABLED=1 AXIOM_P2P_PORT=9001 \
            AXIOM_PEERS="/ip4/127.0.0.1/tcp/9000/p2p/$PEER1_ID" \
            ./target/release/axiom-mcp > /tmp/node2.log 2>&1 &
          echo "NODE2_PID=$!" >> $GITHUB_ENV
          sleep 5

      - name: Verify both nodes connected (peers=1)
        run: |
          PEERS1=$(curl -sf http://localhost:8080/p2p/status | python3 -c "import sys,json; print(json.load(sys.stdin)['peers'])")
          PEERS2=$(curl -sf http://localhost:8081/p2p/status | python3 -c "import sys,json; print(json.load(sys.stdin)['peers'])")
          echo "Node 1 peers: $PEERS1  |  Node 2 peers: $PEERS2"
          [ "$PEERS1" = "1" ] || (echo "FAIL: Node 1 has $PEERS1 peers" && exit 1)
          [ "$PEERS2" = "1" ] || (echo "FAIL: Node 2 has $PEERS2 peers" && exit 1)

      - name: Broadcast proof commitment (Node 1 → Node 2)
        run: |
          curl -sf -X POST http://localhost:8080/tools \
            -H "Content-Type: application/json" \
            -d '{"tool":"p2p_broadcast","input":{"topic":"proof","payload":"ci-test-commitment-abc123"}}'
          sleep 2

      - name: Verify Node 2 received gossipsub message
        run: |
          grep -q "axiom/proof/v1" /tmp/node2.log || \
            (echo "FAIL: Node 2 did not receive gossipsub message" && cat /tmp/node2.log && exit 1)
          echo "PASS: Node 2 received axiom/proof/v1 from Node 1"

      - name: Broadcast prove-req (Node 2 → Node 1)
        run: |
          curl -sf -X POST http://localhost:8081/tools \
            -H "Content-Type: application/json" \
            -d '{"tool":"p2p_broadcast","input":{"topic":"prove","payload":"ci-prove-req-xyz"}}'
          sleep 2
          grep -q "axiom/prove-req/v1" /tmp/node1.log || \
            (echo "FAIL: Node 1 did not receive prove-req from Node 2" && cat /tmp/node1.log && exit 1)
          echo "PASS: Node 1 received axiom/prove-req/v1 from Node 2"

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== NODE 1 ===" && cat /tmp/node1.log || true
          echo "=== NODE 2 ===" && cat /tmp/node2.log || true

      - name: Stop nodes
        if: always()
        run: |
          kill $NODE1_PID $NODE2_PID 2>/dev/null || true

  # ── TEE + PQ smoke test ───────────────────────────────────────────────────
  tee-pq-smoke:
    runs-on: ubuntu-latest
    needs: build-test
    env:
      Z3_SYS_Z3_HEADER: /usr/include/z3.h
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install z3 + clang
        run: sudo apt-get install -y libz3-dev clang

      - name: Build release binary
        run: cargo build --release -p axiom-mcp-server

      - name: Start engine
        run: |
          AXIOM_TRANSPORT=http PORT=8080 ./target/release/axiom-mcp > /tmp/engine.log 2>&1 &
          sleep 3

      - name: TEE status
        run: |
          STATUS=$(curl -sf http://localhost:8080/tee/status)
          echo "$STATUS"
          echo "$STATUS" | python3 -c "import sys,json; s=json.load(sys.stdin); assert s['dev_mode']==True, 'dev_mode must be true'; print('TEE status OK')"

      - name: PQ status
        run: |
          STATUS=$(curl -sf http://localhost:8080/pq/status)
          echo "$STATUS"
          echo "$STATUS" | python3 -c "import sys,json; s=json.load(sys.stdin); assert s['enabled']==True; assert s['vk_bytes']==1952; assert s['sig_bytes']==3309; print('PQ status OK')"

      - name: PQ sign + verify roundtrip
        run: |
          SIG_RESP=$(curl -sf -X POST http://localhost:8080/tools \
            -H "Content-Type: application/json" \
            -d '{"tool":"pq_sign","input":{"message":"636974657374"}}')
          echo "$SIG_RESP"
          VK=$(echo "$SIG_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['verifying_key'])")
          SIG=$(echo "$SIG_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['signature'])")
          VERIFY=$(curl -sf -X POST http://localhost:8080/tools \
            -H "Content-Type: application/json" \
            -d "{\"tool\":\"pq_verify\",\"input\":{\"verifying_key\":\"$VK\",\"message\":\"636974657374\",\"signature\":\"$SIG\"}}")
          echo "$VERIFY" | python3 -c "import sys,json; r=json.load(sys.stdin); assert r['result']['valid']==True; print('PQ sign/verify OK')"

      - name: TEE attest commitment
        run: |
          COMMIT=$(python3 -c "print('cd'*32)")
          RESP=$(curl -sf -X POST http://localhost:8080/tools \
            -H "Content-Type: application/json" \
            -d "{\"tool\":\"tee_attest\",\"input\":{\"commitment\":\"$COMMIT\",\"op\":\"sum\"}}")
          echo "$RESP"
          echo "$RESP" | python3 -c "import sys,json; r=json.load(sys.stdin); a=r['result']['attestation']; assert a['dev_mode']==True; assert len(a['document_hash'])==64; print('TEE attest OK')"

      - name: Stop engine
        if: always()
        run: pkill -f axiom-mcp || true

  # ── AI code review on PRs ────────────────────────────────────────────────
  ai-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get diff
        run: git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr.diff
      - name: Claude review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
          REPO: ${{ github.repository }}
        run: python3 .github/scripts/claude_review.py
