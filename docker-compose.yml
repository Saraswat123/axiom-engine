services:
  axiom-engine:
    build: .
    ports:
      - "8080:8080"
    environment:
      - AXIOM_TRANSPORT=http
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AXIOM_PROVIDER=${AXIOM_PROVIDER:-anthropic}
      - AXIOM_MODEL=${AXIOM_MODEL:-claude-sonnet-4-6}
      - RUST_LOG=${RUST_LOG:-axiom=info,tower_http=info}
      - AXIOM_STORE_PATH=/data/axiom-store
      - PORT=8080
    volumes:
      - axiom-data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - axiom-net
    profiles: ["engine", "full"]

  # axiom-engine with ZK proofs (dev mode — instant mock proofs)
  axiom-engine-zk:
    build:
      context: .
      dockerfile: Dockerfile.zk
    ports:
      - "8081:8080"
    environment:
      - AXIOM_TRANSPORT=http
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AXIOM_STORE_PATH=/data/axiom-store
      - RISC0_DEV_MODE=1
      - RUST_LOG=axiom=info
      - PORT=8080
    volumes:
      - axiom-data:/data
    networks:
      - axiom-net
    profiles: ["zk"]

  # Local Ethereum dev node — Phase 4
  axiom-testnet:
    image: ethereum/client-go:latest
    command: >
      --dev
      --http --http.addr 0.0.0.0 --http.port 8545
      --http.api eth,net,web3,debug
      --ws --ws.addr 0.0.0.0 --ws.port 8546
      --dev.period 2
    ports:
      - "8545:8545"
      - "8546:8546"
    networks:
      - axiom-net
    profiles: ["testnet", "full"]

  # ── P2P cluster (3 nodes) — docker compose --profile cluster up ──────────

  axiom-node1:
    build: .
    ports:
      - "8080:8080"
      - "9000:9000"
    environment:
      - AXIOM_TRANSPORT=http
      - PORT=8080
      - AXIOM_P2P_ENABLED=1
      - AXIOM_P2P_PORT=9000
      - AXIOM_STORE_PATH=/data/axiom-store
      - RUST_LOG=axiom=info,libp2p=warn
    volumes:
      - axiom-node1-data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - axiom-net
    profiles: ["cluster"]

  axiom-node2:
    build: .
    ports:
      - "8081:8080"
      - "9001:9000"
    environment:
      - AXIOM_TRANSPORT=http
      - PORT=8080
      - AXIOM_P2P_ENABLED=1
      - AXIOM_P2P_PORT=9000
      - AXIOM_PEERS=/ip4/axiom-node1/tcp/9000
      - AXIOM_STORE_PATH=/data/axiom-store
      - RUST_LOG=axiom=info,libp2p=warn
    volumes:
      - axiom-node2-data:/data
    depends_on:
      axiom-node1:
        condition: service_healthy
    networks:
      - axiom-net
    profiles: ["cluster"]

  axiom-node3:
    build: .
    ports:
      - "8082:8080"
      - "9002:9000"
    environment:
      - AXIOM_TRANSPORT=http
      - PORT=8080
      - AXIOM_P2P_ENABLED=1
      - AXIOM_P2P_PORT=9000
      - AXIOM_PEERS=/ip4/axiom-node1/tcp/9000
      - AXIOM_STORE_PATH=/data/axiom-store
      - RUST_LOG=axiom=info,libp2p=warn
    volumes:
      - axiom-node3-data:/data
    depends_on:
      axiom-node1:
        condition: service_healthy
    networks:
      - axiom-net
    profiles: ["cluster"]

  # Prometheus metrics
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - axiom-net
    profiles: ["monitoring", "full"]

  # Grafana dashboard
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      - prometheus
    networks:
      - axiom-net
    profiles: ["monitoring", "full"]

volumes:
  axiom-data:
    driver: local
  axiom-node1-data:
    driver: local
  axiom-node2-data:
    driver: local
  axiom-node3-data:
    driver: local

networks:
  axiom-net:
    driver: bridge
